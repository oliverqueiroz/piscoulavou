<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Identificação</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#f4f6f9;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.card{background:#fff;width:100%;max-width:430px;padding:40px;border-radius:18px;box-shadow:0 10px 40px rgba(0,0,0,.08)}
.logo{text-align:center;margin-bottom:25px}
.logo img{width:160px}
h1{text-align:center;margin-bottom:10px}
.sub{text-align:center;color:#666;margin-bottom:30px}
label{display:block;margin-bottom:6px;font-weight:bold}
input{width:100%;padding:14px;border:1px solid #ddd;border-radius:10px;margin-bottom:18px;font-size:16px}
button{width:100%;padding:15px;background:#009DFF;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer}
button:disabled{opacity:.6}
.msg{text-align:center;margin-top:15px;color:#d63333}
</style>
</head>

<body>

<div class="card">

<div class="logo">
<img src="logo.png" alt="logo">
</div>

<h1>Identificação</h1>
<div class="sub">Informe seus dados para continuar</div>

<label>Nome</label>
<input id="nome" placeholder="Seu nome">

<label>CPF</label>
<input id="cpf" maxlength="14" placeholder="000.000.000-00">

<button id="btn" onclick="enviar()">Continuar</button>

<div id="msg" class="msg"></div>

</div>

<script>

// 🔗 WEBHOOK CADASTRO (SEU GOOGLE SCRIPT)
const webhookCadastro = "https://script.google.com/macros/s/AKfycbzQGzqY4Ni5TWd0sUmY3jb-hRH-zBDMkc-sSe1roP35F40_gJdW5R8-JBDLQANzBTM0kA/exec";

// 🔗 WEBHOOK PORTA (AINDA NÃO USADO)
const webhookPorta = null;

// ⏱ 4 horas de acesso
const TEMPO = 4 * 60 * 60 * 1000;

// auto login
const acesso = JSON.parse(localStorage.getItem("acessoPorta"));
if (acesso && (Date.now() - acesso.data) < TEMPO) {
    window.location.href = "porta-liberada.html";
}

// CPF mask
cpf.addEventListener("input", function () {
    let v = this.value.replace(/\D/g,'');
    v = v.replace(/(\d{3})(\d)/,"$1.$2");
    v = v.replace(/(\d{3})(\d)/,"$1.$2");
    v = v.replace(/(\d{3})(\d{1,2})$/,"$1-$2");
    this.value = v;
});

// valida CPF
function validarCPF(cpf){
    cpf = cpf.replace(/\D/g,'');
    if(cpf.length !== 11) return false;
    if(/^(\d)\1+$/.test(cpf)) return false;

    let soma = 0;
    for(let i=1;i<=9;i++)
        soma += parseInt(cpf.substring(i-1,i))*(11-i);

    let resto = (soma*10)%11;
    if(resto>=10) resto=0;
    if(resto != parseInt(cpf.substring(9,10))) return false;

    soma = 0;
    for(let i=1;i<=10;i++)
        soma += parseInt(cpf.substring(i-1,i))*(12-i);

    resto = (soma*10)%11;
    if(resto>=10) resto=0;

    return resto == parseInt(cpf.substring(10,11));
}

async function enviar(){

    const nome = document.getElementById("nome").value.trim();
    const cpf = document.getElementById("cpf").value.replace(/\D/g,'');
    const msg = document.getElementById("msg");

    msg.innerHTML = "";

    if(nome.length < 3){
        msg.innerHTML = "Nome inválido";
        return;
    }

    if(!validarCPF(cpf)){
        msg.innerHTML = "CPF inválido";
        return;
    }

    const btn = document.getElementById("btn");
    btn.disabled = true;
    btn.innerText = "Carregando...";

    try {
        await fetch(webhookCadastro, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ nome, cpf })
        });

        // salva acesso local (4h)
        localStorage.setItem("acessoPorta", JSON.stringify({
            nome,
            cpf,
            data: Date.now()
        }));

        // opcional: webhook da porta (ainda desligado)
        if (webhookPorta) {
            fetch(webhookPorta, {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({
                    nome,
                    cpf,
                    acesso: true,
                    data: Date.now()
                })
            }).catch(()=>{});
        }

        window.location.href = "porta-liberada.html";

    } catch(e){
        msg.innerHTML = "Erro ao enviar";
        btn.disabled = false;
        btn.innerText = "Continuar";
    }
}

</script>

</body>
</html>
