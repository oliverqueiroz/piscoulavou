<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Porta Liberada</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f6f9;
}

.card{
    text-align:center;
    background:white;
    padding:50px;
    border-radius:18px;
    box-shadow:0 10px 40px rgba(0,0,0,.08);
    max-width:450px;
}

img{
    width:160px;
    margin-bottom:25px;
}

h1{
    color:#009DFF;
    margin-bottom:10px;
}

p{
    color:#666;
    margin-bottom:30px;
}

button{
    background:#009DFF;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

button:hover{
    background:#0087db;
}

</style>
</head>

<body>

<div class="card">

    <img src="logo.png" alt="Logo">

    <h1>Porta Liberada</h1>

    <p>Seu acesso foi validado com sucesso.</p>

    <button onclick="encerrarSessao()">
        Encerrar acesso
    </button>

</div>

<script>

const TEMPO_AUTORIZACAO = 24 * 60 * 60 * 1000;

const acesso = JSON.parse(localStorage.getItem("acessoPorta"));

if (!acesso) {
    window.location.href = "index.html";
}

if ((Date.now() - acesso.data) > TEMPO_AUTORIZACAO) {
    localStorage.removeItem("acessoPorta");
    window.location.href = "index.html";
}

function encerrarSessao(){
    localStorage.removeItem("acessoPorta");
    window.location.href = "index.html";
}

</script>

</body>
</html>
