<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Porta Liberada</title>

<style>

body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f6f9;
}

.card{
    text-align:center;
    background:white;
    padding:50px;
    border-radius:18px;
    box-shadow:0 10px 40px rgba(0,0,0,.08);
    max-width:450px;
}

img{
    width:160px;
    margin-bottom:25px;
}

h1{
    color:#009DFF;
    margin-bottom:10px;
}

p{
    color:#666;
}

</style>
</head>

<body>

<div class="card">

    <img src="logo.png">

    <h1>Porta Liberada</h1>

    <p>Seu acesso foi validado com sucesso.</p>

</div>

</body>
</html>
